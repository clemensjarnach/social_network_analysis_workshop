project:
  type: book
  output-dir: docs
  # execute:
  #   cache: true
  #   freeze: auto
  
book:
  title: "Social Network Analysis Workshop"
  author: "Dr Clemens Jarnach"
  date: "03/14/2026"
  repo-url: https://clemensjarnach.github.io/social_network_analysis_workshop/
  chapters:
    - index.qmd
    - 1_introduction_to_networks.qmd
    - 2_slides.qmd
    - summary.qmd
    - r_basics.qmd
    - references.qmd

bibliography: references.bib

format:
  html:
    split-by: chapter  
    number-depth: 1
    theme: cosmo
    highlight-style: atom-one
    code-block-bg: "#f0f0f0"
    code-block-border-left: "#045a8d"
    code-fold: false
    code-summary: "Code"
    code-tools: true
    code-link: true
    code-copy: true
    knitr:
      opts_chunk:
        out.width: 100%
        R.options:
          width: 68
  # pdf:
  #   documentclass: scrbook
  #   always_allow_html: true
  #   include-in-header:
  #     - text: |
  #         \usepackage{dcolumn}
    
pdf-engine: lualatex
